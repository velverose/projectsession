<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Assistant</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 800px; max-width: 90%; display: none; }
        .login-container { background-color: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        h1, h2, h3 { color: #333; }
        input[type="text"], input[type="password"], textarea, select, input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background-color: #4CAF50; color: white; padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .logout-btn { background-color: #f44336; width: auto; float: right; }
        .logout-btn:hover { background-color: #d32f2f; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; border-radius: 5px; background-color: #fafafa; }
        ul { list-style-type: none; padding: 0; }
        li { background: #eee; margin: 5px 0; padding: 10px; border-radius: 3px; display: flex; justify-content: space-between; align-items: center; }
        .completed-task { background-color: #e9f7ef; }
        .task-actions button, .note-actions button { margin-left: 5px; }
        .delete-btn { background-color: #ff9800; padding: 5px 10px; width: auto; margin: 0; }
        .delete-btn:hover { background-color: #e68a00; }
        .small-input { width: calc(50% - 5px); display: inline-block; }
        #timeDisplay { font-size: 1.2em; font-weight: bold; color: #2196F3; text-align: center; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div class="login-container" id="loginSection">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username (user)" value="user">
        <input type="password" id="password" placeholder="Password (password)" value="password">
        <button onclick="login()">Login</button>
        <p id="loginError" style="color: red; display: none;">Invalid credentials</p>
    </div>

    <!-- Main Dashboard Section -->
    <div class="container" id="dashboardSection">
        <button class="logout-btn" onclick="logout()">Logout</button>
        <h1>Personal Assistant Dashboard</h1>
        
        <div id="timeDisplay">Current Time: Loading...</div>

        <div class="dashboard-grid">
            <!-- Tasks Section -->
            <div class="card">
                <h3>Tasks</h3>
                <input type="text" id="taskTitle" placeholder="Task Title">
                <input type="text" id="taskDescription" placeholder="Task Description">
                <button onclick="createTask()">Add Task</button>
                <ul id="taskList"></ul>
            </div>

            <!-- Notes Section -->
            <div class="card">
                <h3>Notes</h3>
                <input type="text" id="noteTitle" placeholder="Note Title">
                <textarea id="noteContent" placeholder="Note Content" rows="3"></textarea>
                <button onclick="createNote()">Add Note</button>
                <ul id="noteList"></ul>
            </div>
            
            <!-- Calculator Section -->
            <div class="card" style="grid-column: span 2;">
                <h3>Calculator</h3>
                <input type="number" id="calcA" class="small-input" placeholder="Number A">
                <select id="calcOp" style="width: 20%; display: inline-block; padding: 10px; margin: 10px 0;">
                    <option value="add">+</option>
                    <option value="subtract">-</option>
                    <option value="multiply">*</option>
                    <option value="divide">/</option>
                </select>
                <input type="number" id="calcB" class="small-input" placeholder="Number B">
                <button onclick="calculate()" style="width: 20%; display: inline-block;">Calculate</button>
                <p id="calcResult" style="font-weight: bold; margin-left: 10px; display: inline-block;"></p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
